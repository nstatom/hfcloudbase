<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Airport Ceilometer Data</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{font-family:Arial;margin:20px;}
#plot{height:450px;border:2px solid #444;margin-top:10px;}
pre{background:#eee;padding:10px;height:200px;overflow:auto;}
.error{color:red;}
.warning{color:orange;}
</style>
</head>

<body>

<h2>Airport Ceilometer Data v1.05</h2>

<label>Airport ICAO Code:</label>
<input id="icao" value="KSAN">

<label>Prior Hours to Display (max 168):</label>
<input id="hours" value="24">

<button onclick="run()">Run Update</button>
<br>

<h3>Cloudflare Worker Request</h3>
<div id="status"></div>

<br>
<h3>Worker JSON Response</h3>
<pre id="raw"></pre>

<br>
<h3>Airport Cloud Ceiling Time Series Plot</h3>
<div id="plot"></div>

<script>

const WORKER_URL = "https://noaa-fetch.nstatom.workers.dev"

// ---------------- RUN ----------------

async function run(){

let icao = document.getElementById("icao").value.toUpperCase();
let hours = parseInt(document.getElementById("hours").value);

// enforce max
if(hours > 168){
  hours = 168;
  document.getElementById("hours").value = 168;

  document.getElementById("status").innerHTML =
    "<span class='warning'>Max hours is 168. Reset to 168.</span>";
}

// Worker URL
const url = `${WORKER_URL}?station=${icao}&hours=${hours}`;

document.getElementById("status").innerHTML = url;

try{

const r = await fetch(url);

document.getElementById("status").innerHTML +=
"<br>Status: " + r.status;

const json = await r.json();

// show full response
document.getElementById("raw").textContent =
JSON.stringify(json, null, 2);

// Worker returns { data: [...] }
plot(json.data);

}catch(err){

document.getElementById("status").innerHTML =
"<span class='error'>Download failed</span>";

console.error(err);

}

}

// ---------------- PLOT ----------------

function plot(data){

let x = [];
let y = [];

data.forEach(m => {

if(!m.clouds) return;

m.clouds.forEach(c => {

if(!c.base) return;

// Worker uses ISO time string
x.push(new Date(m.time));
y.push(c.base);

});

});

Plotly.newPlot("plot",[{
x:x,
y:y,
mode:"markers"
}],{
margin:{l:40,r:20,t:20,b:40},
xaxis:{title:"Time [UTC]"},
yaxis:{title:"Cloud Base AGL [ft]"}
});

}

// ---------------- INIT ----------------

run();

</script>

</body>
</html>
