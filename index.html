<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Airport Ceilometer Data</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{font-family:Arial;margin:20px;}
#plot{height:450px;border:2px solid #444;margin-top:10px;}
pre{background:#eee;padding:10px;height:200px;overflow:auto;}
.error{color:red;}
</style>
</head>

<body>

<h2>Airport Ceilometer Data v1.01</h2>

<label>ICAO:</label>
<input id="icao" value="KSAN">

<label>Hours:</label>
<input id="hours" value="24">

<button onclick="run()">Run Test</button>

<h3>Aviation Weather METAR Request</h3>

<div id="status"></div>

<h3>Aviation Weather METAR Response</h3>
<pre id="raw"></pre>

<div id="plot"></div>

<script>

async function run(){

let icao=document.getElementById("icao").value.toUpperCase();
let hours=document.getElementById("hours").value;

const api =
`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&hours=${hours}`;

/* CORS proxy for debugging */
const url =
`https://api.allorigins.win/raw?url=${encodeURIComponent(api)}`;

document.getElementById("status").innerHTML =
url;

try{

const r=await fetch(url);

document.getElementById("status").innerHTML +=
"<br>Status: "+r.status;

const data=await r.json();

document.getElementById("raw").textContent =
JSON.stringify(data,null,2);

plot(data);

}catch(err){

document.getElementById("status").innerHTML =
"<span class='error'>Download failed</span>";

console.error(err);

}

}

function plot(data){

let x=[];
let y=[];

data.forEach(m=>{

if(!m.clouds) return;

m.clouds.forEach(c=>{

x.push(new Date(m.obsTime * 1000));
y.push(c.base);

});

});

Plotly.newPlot("plot",[{
x:x,
y:y,
mode:"markers"
}],{
xaxis:{title:"Time [UTC]"},
yaxis:{title:"Cloud Base AGL [ft]"}
});

}

run();

</script>

</body>
</html>
