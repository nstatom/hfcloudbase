<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>METAR API Test</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<style>
body{
font-family:Arial;
margin:20px;
}

#plot{
height:450px;
border:2px solid #444;
margin-top:10px;
}

pre{
background:#eee;
padding:10px;
overflow:auto;
height:200px;
}

.error{
color:red;
}
</style>
</head>

<body>

<h2>METAR API Debug Tool</h2>

<label>ICAO:</label>
<input id="icaoInput" value="KSAN">

<label>Hours:</label>
<input id="hoursInput" value="24" type="number">

<button onclick="runTest()">Run Test</button>

<div id="status"></div>

<h3>Raw API Response</h3>
<pre id="raw"></pre>

<div id="plot"></div>

<script>

async function runTest(){

const icao =
document.getElementById("icaoInput").value.toUpperCase();

const hours =
document.getElementById("hoursInput").value;

const url =
`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&hours=${hours}`;

document.getElementById("status").innerHTML =
"Downloading: " + url;

try{

const response = await fetch(url);

document.getElementById("status").innerHTML +=
"<br>Status: " + response.status;

const data = await response.json();

document.getElementById("raw").textContent =
JSON.stringify(data,null,2);

plotTest(data);

}
catch(err){

document.getElementById("status").innerHTML =
"<span class='error'>Fetch failed</span>";

console.error(err);

}

}

function plotTest(data){

let times=[];
let heights=[];

data.forEach(m => {

if(!m.clouds) return;

m.clouds.forEach(layer => {

times.push(new Date(m.obsTime));
heights.push(layer.base);

});

});

let trace = {

x:times,
y:heights,

mode:"markers",

marker:{
size:12
}

};

Plotly.newPlot("plot",[trace],{
xaxis:{title:"Time"},
yaxis:{title:"Cloud Base (ft)"}
});

}

runTest();

</script>

</body>
</html>
